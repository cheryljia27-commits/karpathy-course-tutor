name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: pytest
      - run: python -m pip check
      - run: python -m karpathy_course_tutor next --state examples/learner-state.json
      - name: Verify the installed wheel outside the source tree
        run: |
          repository_root="$PWD"
          python -m pip wheel . --no-deps --wheel-dir dist
          python -m venv /tmp/karpathy-tutor-wheel
          /tmp/karpathy-tutor-wheel/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/karpathy-tutor-wheel/bin/karpathy-tutor sources --track evaluation
          /tmp/karpathy-tutor-wheel/bin/karpathy-tutor next \
            --state "$repository_root/examples/learner-state.json"
